<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Playabl-Event – Spielangebot pro Slot</title>
<script>
  try {
    const saved = localStorage.getItem("raumplan-theme");
    const initial = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", initial);
  } catch {}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Open+Sans:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Theme-System, 1:1 aus dem Schwester-Projekt con-raumplan portiert
     (siehe dort theme.css) — Skala themenunabhängig, 7 Themes per
     [data-theme] auf <html> (siehe applyTheme() weiter unten im Script).
     Kein data-theme-Attribut (JS blockiert/deaktiviert) fällt auf "dark"
     zurück, wie schon in con-raumplan.
     ============================================================ */
  :root {
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
    --sp-5: 24px; --sp-6: 32px; --sp-7: 48px;
    --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-pill: 999px;
    --fs-xs: .76rem; --fs-sm: .86rem; --fs-base: 1rem; --fs-md: 1.05rem;
    --fs-lg: 1.3rem; --fs-xl: 1.6rem; --fs-2xl: 1.7rem;
    --font-body: system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-display: var(--font-body);
    --shadow-card: none;
    --border-w: 1px;
  }

  :root, :root[data-theme="dark"] {
    color-scheme: dark;
    --page:           #0b0d10;
    --surface-1:      #15181d;
    --surface-2:      #1c2027;
    --text-primary:   #f3f4f2;
    --text-secondary: #a9b0bb;
    --text-muted:     #6b7280;
    --grid:           #2a2e36;
    --baseline:       #3a3f48;
    --band-edge:      #52514e;
    --border:         rgba(255,255,255,0.09);
    --accent:         #5b8def;
    --accent-ink:     #ffffff;
    --accent-soft:    #223252;
    --series-soft:    #2c4a7a;
    --good:  #35c266;
    --warn:  #ff8a80;
    --band:  #1c2027;
    --shadow-card: 0 1px 2px rgba(0,0,0,.4), 0 8px 20px -12px rgba(0,0,0,.55);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --page:           #f6f5f2;
    --surface-1:      #ffffff;
    --surface-2:      #fbfaf7;
    --text-primary:   #1c1d1f;
    --text-secondary: #55575c;
    --text-muted:     #8a8d93;
    --grid:           #e7e5df;
    --baseline:       #cfccc3;
    --band-edge:      #cfccc3;
    --border:         rgba(20,20,20,0.10);
    --accent:         #2a5fd6;
    --accent-ink:     #ffffff;
    --accent-soft:    #e4ecfc;
    --series-soft:    #a9c2ef;
    --good:  #0f7a3d;
    --warn:  #b3261e;
    --band:  #f0eee8;
    --shadow-card: 0 1px 2px rgba(30,20,0,.05), 0 6px 16px -10px rgba(30,20,0,.16);
  }
  :root[data-theme="contrast"] {
    color-scheme: light;
    --page:           #ffffff;
    --surface-1:      #ffffff;
    --surface-2:      #ffffff;
    --text-primary:   #000000;
    --text-secondary: #000000;
    --text-muted:     #262626;
    --grid:           #000000;
    --baseline:       #000000;
    --band-edge:      #000000;
    --border:         #000000;
    --accent:         #0000cc;
    --accent-ink:     #ffffff;
    --accent-soft:    #e0e0ff;
    --series-soft:    #ccccff;
    --good:  #006600;
    --warn:  #b30000;
    --band:  #eeeeee;
    --shadow-card: none;
    --border-w: 2px;
  }
  :root[data-theme="contrast"] .seg { border: 1px solid var(--text-primary); }
  :root[data-theme="colorful"] {
    color-scheme: light;
    --page:           #f4f2fb;
    --surface-1:      #ffffff;
    --surface-2:      #f8f6ff;
    --text-primary:   #211a3d;
    --text-secondary: #4f4870;
    --text-muted:     #8b84a8;
    --grid:           #e6e1f7;
    --baseline:       #cfc5ee;
    --band-edge:      #b8a8dc;
    --border:         rgba(70,34,184,0.14);
    --accent:         #4622b8;
    --accent-ink:     #ffffff;
    --accent-soft:    #ece5fc;
    --series-soft:    #d3c2f5;
    --good:  #16a34a;
    --warn:  #dc2626;
    --band:  #fdf0f2;
    --shadow-card: 0 2px 4px rgba(70,34,184,.06), 0 10px 24px -14px rgba(70,34,184,.28);
    --font-display: "Paytone One", var(--font-body);
    --font-body: "Open Sans", system-ui, -apple-system, sans-serif;
  }
  :root[data-theme="terminal"] {
    color-scheme: dark;
    --page:           #050a05;
    --surface-1:      #0a140a;
    --surface-2:      #0e1c0e;
    --text-primary:   #6dffa0;
    --text-secondary: #3fcf74;
    --text-muted:     #2a8a4e;
    --grid:           #144024;
    --baseline:       #1f5c34;
    --band-edge:      #2a8a4e;
    --border:         rgba(80,255,140,0.28);
    --accent:         #3dff85;
    --accent-ink:     #04150a;
    --accent-soft:    #0f2a18;
    --series-soft:    #1a5c34;
    --good:  #7dffb0;
    --warn:  #ffb648;
    --band:  #0c1b0f;
    --shadow-card: 0 0 0 1px rgba(80,255,140,.12), 0 0 18px -6px rgba(70,255,140,.35);
    --font-body: "Share Tech Mono", "Courier New", monospace;
    --font-display: "Share Tech Mono", "Courier New", monospace;
  }
  :root[data-theme="terminal"] body {
    background-image: repeating-linear-gradient(180deg,
      rgba(80,255,140,0.035) 0px, rgba(80,255,140,0.035) 1px, transparent 1px, transparent 3px);
  }
  :root[data-theme="terminal"] .card, :root[data-theme="terminal"] .cal-card {
    box-shadow: 0 0 0 3px var(--page), 0 0 0 4px var(--border), var(--shadow-card);
  }
  :root[data-theme="terminal"] ::selection { background: var(--accent); color: var(--accent-ink); }
  @media (prefers-reduced-motion: no-preference) {
    :root[data-theme="terminal"] body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: linear-gradient(180deg, transparent 0%, rgba(80,255,140,0.05) 50%, transparent 100%);
      background-size: 100% 220px;
      animation: rp-scan-sweep 9s linear infinite;
    }
    @keyframes rp-scan-sweep { from { background-position: 0 -220px; } to { background-position: 0 100vh; } }
  }
  :root[data-theme="cyberpunk"] {
    color-scheme: dark;
    --page:           #0a0612;
    --surface-1:      #140a24;
    --surface-2:      #1c0f30;
    --text-primary:   #f2e9ff;
    --text-secondary: #c9a8ff;
    --text-muted:     #7a5ca3;
    --grid:           #2a1642;
    --baseline:       #3d2159;
    --band-edge:      #7a5ca3;
    --border:         rgba(255,60,220,0.35);
    --accent:         #00f0ff;
    --accent-ink:     #04030a;
    --accent-soft:    #123a42;
    --series-soft:    #472a63;
    --good:  #39ff8f;
    --warn:  #ffe83d;
    --band:  #170b28;
    --shadow-card: 0 0 0 1px rgba(0,240,255,.25), 0 0 24px -4px rgba(255,47,208,.5), 0 0 44px -14px rgba(0,240,255,.4);
    --font-display: "Orbitron", var(--font-body);
  }
  :root[data-theme="cyberpunk"] .card, :root[data-theme="cyberpunk"] .cal-card {
    box-shadow: 0 0 0 1px var(--border), var(--shadow-card);
  }
  :root[data-theme="cyberpunk"] ::selection { background: var(--accent); color: var(--accent-ink); }
  :root[data-theme="cyberpunk"] h1 { text-shadow: 0 0 12px color-mix(in srgb, var(--accent) 55%, transparent); }
  @media (prefers-reduced-motion: no-preference) {
    :root[data-theme="cyberpunk"] h1:hover { animation: rp-glitch .38s steps(2, end) 1; }
    @keyframes rp-glitch {
      0%, 100% { text-shadow: 0 0 12px color-mix(in srgb, var(--accent) 55%, transparent); transform: translate(0, 0); }
      20% { text-shadow: -2px 0 rgba(255,47,208,.85), 2px 0 rgba(0,240,255,.85), 0 0 12px color-mix(in srgb, var(--accent) 55%, transparent); transform: translate(-2px, 1px); }
      40% { text-shadow: 2px 0 rgba(255,47,208,.85), -2px 0 rgba(0,240,255,.85), 0 0 12px color-mix(in srgb, var(--accent) 55%, transparent); transform: translate(2px, -1px); }
      60% { text-shadow: -1px 0 rgba(255,47,208,.85), 1px 0 rgba(0,240,255,.85), 0 0 12px color-mix(in srgb, var(--accent) 55%, transparent); transform: translate(1px, 0); }
      80% { text-shadow: 1px 0 rgba(0,240,255,.85), -1px 0 rgba(255,47,208,.85), 0 0 12px color-mix(in srgb, var(--accent) 55%, transparent); transform: translate(-1px, 0); }
    }
  }
  :root[data-theme="ukiyo"] {
    color-scheme: light;
    --page:           #f7f1e6;
    --surface-1:      #fbf7ee;
    --surface-2:      #f1e9d8;
    --text-primary:   #2b2620;
    --text-secondary: #5a5044;
    --text-muted:     #948a78;
    --grid:           #e3d9c4;
    --baseline:       #d8cbb0;
    --band-edge:      #d8cbb0;
    --border:         rgba(43,38,32,0.14);
    --accent:         #8b2f3b;
    --accent-ink:     #fdf6ec;
    --accent-soft:    #f3e1e0;
    --series-soft:    #e0c4c0;
    --good:  #4a6741;
    --warn:  #a3671f;
    --band:  #efe6d3;
    --shadow-card: none;
    --font-display: "Shippori Mincho", var(--font-body);
  }
  :root[data-theme="ukiyo"] .card, :root[data-theme="ukiyo"] .cal-card, :root[data-theme="ukiyo"] .kpi {
    border-width: 1px;
  }
  :root[data-theme="ukiyo"] ::selection { background: var(--accent-soft); color: var(--text-primary); }
  :root[data-theme="ukiyo"] body {
    background-image:
      linear-gradient(color-mix(in srgb, var(--page) 95%, transparent), color-mix(in srgb, var(--page) 95%, transparent)),
      var(--ukiyo-bg, none);
    background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page);
    color: var(--text-primary);
    font-family: var(--font-body);
    line-height: 1.5;
    padding: var(--sp-6) var(--sp-4) var(--sp-7);
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  h1 { font-family: var(--font-display); font-size: var(--fs-2xl); font-weight: 700; text-wrap: balance; }
  .sub { color: var(--text-secondary); font-size: var(--fs-sm); margin-top: var(--sp-1); }
  #status { font-size: var(--fs-xs); color: var(--text-muted); margin: var(--sp-2) 0; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }
  .skip-link { position: absolute; left: -9999px; top: 0; background: var(--surface-1); color: var(--text-primary); padding: var(--sp-2) var(--sp-4); border-radius: var(--r-sm); z-index: 20; border: var(--border-w) solid var(--border); }
  .skip-link:focus { left: 8px; top: 8px; }
  a { color: var(--accent); }
  a:focus-visible, button:focus-visible, select:focus-visible, input:focus-visible, summary:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px;
  }

  /* ============================================================
     Dark Kinetic Minimalism — dasselbe zurückhaltende Bewegungsvokabular
     wie in con-raumplan: Hover-Lift + Schatten-Zunahme auf den
     "schwebenden" Bausteinen, kurzes Einblenden beim Rendern.
     ============================================================ */
  @media (prefers-reduced-motion: no-preference) {
    .card, .kpi, .fact, .cal-card, #tooltip, .banner {
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .card:hover, .kpi:hover, .fact:hover, .cal-card:hover { transform: translateY(-2px); }
    .card, .kpi, .fact, .cal-card { animation: rp-fadein .28s ease-out both; }
  }
  @keyframes rp-fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

  .banner {
    margin: var(--sp-3) 0; padding: var(--sp-3) var(--sp-4); border-radius: var(--r-md);
    background: var(--band); border: var(--border-w) solid var(--border); font-size: var(--fs-sm);
    box-shadow: var(--shadow-card);
  }
  .banner.open { border-color: var(--good); }

  .controls {
    display: flex; flex-wrap: wrap; gap: var(--sp-3) var(--sp-4); align-items: end;
    margin: var(--sp-4) 0 var(--sp-2); padding: var(--sp-3);
    background: var(--surface-1); border: var(--border-w) solid var(--border); border-radius: var(--r-md);
    box-shadow: var(--shadow-card);
  }
  .controls .field { display: flex; flex-direction: column; gap: 3px; }
  .controls label { font-size: var(--fs-xs); color: var(--text-secondary); }
  .controls select, .controls input, .controls button {
    font: inherit; font-size: var(--fs-sm); color: var(--text-primary);
    background: var(--page); border: var(--border-w) solid var(--baseline); border-radius: var(--r-sm);
    padding: var(--sp-2) var(--sp-3); max-width: 300px;
  }
  .controls button { cursor: pointer; }

  /* Segmented-Control — dasselbe Muster wie .slot-tabs/.theme-switch in
     con-raumplan: transparente Buttons, aktiver Button surface-1+Schatten. */
  .tabs, .theme-switch { display: flex; gap: 2px; background: var(--band); padding: 3px; border-radius: var(--r-md); }
  .tabs { margin-left: auto; }
  .tabs button, .theme-switch button {
    background: transparent; border: none; border-radius: calc(var(--r-md) - 3px);
    padding: var(--sp-2) var(--sp-3); font-size: var(--fs-xs); font-weight: 700; color: var(--text-secondary);
  }
  .theme-switch button { font-size: 1rem; padding: var(--sp-1) var(--sp-2); }
  .tabs button[aria-pressed="true"], .theme-switch button[aria-pressed="true"] {
    background: var(--surface-1); color: var(--text-primary); box-shadow: var(--shadow-card);
  }

  .kpis { display: flex; flex-wrap: wrap; gap: var(--sp-3); margin: var(--sp-4) 0; }
  .kpi {
    background: var(--surface-1); border: var(--border-w) solid var(--border); border-radius: var(--r-lg);
    padding: var(--sp-3) var(--sp-4); flex: 1 1 150px; min-width: 150px; box-shadow: var(--shadow-card);
  }
  .kpi .v { font-size: var(--fs-xl); font-weight: 800; font-variant-numeric: tabular-nums; }
  .kpi .l { font-size: var(--fs-xs); color: var(--text-secondary); }
  .card {
    background: var(--surface-1); border: var(--border-w) solid var(--border); border-radius: var(--r-lg);
    padding: var(--sp-5) var(--sp-6); margin-bottom: var(--sp-4); box-shadow: var(--shadow-card);
  }
  .card h2 { font-family: var(--font-display); font-size: var(--fs-md); font-weight: 700; margin-bottom: var(--sp-1); }
  .card h3 { font-size: var(--fs-sm); margin: var(--sp-5) 0 var(--sp-2); text-transform: uppercase; letter-spacing: .04em; color: var(--text-secondary); }
  .card .hint { font-size: var(--fs-xs); color: var(--text-secondary); margin-bottom: var(--sp-4); }

  .chart { position: relative; }
  .row { display: grid; grid-template-columns: 160px 1fr; gap: var(--sp-3); align-items: center; margin: var(--sp-4) 0; }
  .row .lbl { font-size: var(--fs-sm); text-align: right; }
  .row .lbl b { display: block; white-space: nowrap; }
  .row .lbl span { color: var(--text-muted); font-size: var(--fs-xs); display: block; }
  .track { position: relative; height: 34px; }
  .band {
    position: absolute; top: -4px; bottom: -4px;
    background: var(--band);
    border-left: 1px dashed var(--band-edge);
    border-right: 1px dashed var(--band-edge);
  }
  .bar { position: absolute; top: 4px; bottom: 4px; left: 0; display: flex; gap: 2px; }
  .seg { background: var(--accent); position: relative; cursor: pointer; overflow: hidden; display: block; }
  .seg .fill { position: absolute; inset: 0; background: var(--series-soft); transform-origin: left; }
  .seg:first-child { border-radius: var(--r-sm) 0 0 var(--r-sm); }
  .seg:last-child { border-radius: 0 var(--r-sm) var(--r-sm) 0; }
  .seg:only-child { border-radius: var(--r-sm); }
  .seg:hover { filter: brightness(1.15); }
  .val { position: absolute; top: 50%; transform: translateY(-50%); font-size: var(--fs-sm); font-weight: 600; white-space: nowrap; }
  .gap-note { position: absolute; top: 50%; transform: translateY(-50%); font-size: var(--fs-xs); color: var(--text-muted); white-space: nowrap; }
  .ghost { position: absolute; top: 4px; bottom: 4px; border: 1.5px dashed var(--band-edge); border-radius: var(--r-sm); pointer-events: none; }
  .baseline-x { display: grid; grid-template-columns: 160px 1fr; gap: var(--sp-3); margin-top: 4px; }
  .xticks { position: relative; height: 18px; border-top: var(--border-w) solid var(--baseline); }
  .xticks span { position: absolute; top: 2px; transform: translateX(-50%); font-size: var(--fs-xs); color: var(--text-muted); }

  #tooltip {
    position: fixed; z-index: 10; pointer-events: none; display: none;
    background: var(--surface-1); color: var(--text-primary);
    border: var(--border-w) solid var(--border); border-radius: var(--r-md);
    box-shadow: var(--shadow-card), 0 4px 14px rgba(0,0,0,.18);
    padding: var(--sp-2) var(--sp-3); font-size: var(--fs-xs); max-width: 280px;
  }
  #tooltip .t { font-weight: 600; }
  #tooltip .s { color: var(--text-secondary); }

  table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); font-variant-numeric: tabular-nums; }
  th, td { padding: var(--sp-2) var(--sp-3); text-align: right; border-bottom: var(--border-w) solid var(--grid); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--text-secondary); font-weight: 700; font-size: var(--fs-xs); }
  td.need { font-weight: 700; }
  tr.worst td { background: color-mix(in srgb, var(--band) 60%, transparent); }

  details { margin-top: var(--sp-2); }
  summary { cursor: pointer; font-size: var(--fs-sm); font-weight: 700; padding: var(--sp-2) 0; }
  .games td { padding: 4px var(--sp-3); }
  .games td:last-child { text-align: right; color: var(--text-secondary); white-space: nowrap; }

  .free-row, .ws-row {
    display: flex; justify-content: space-between; gap: var(--sp-3); flex-wrap: wrap;
    padding: var(--sp-2) 0; border-bottom: var(--border-w) solid var(--grid); font-size: var(--fs-sm);
  }
  .free-row a, .ws-row a { color: inherit; font-weight: 600; }
  .free-row span, .ws-row span { color: var(--text-secondary); }

  /* Pill-Badge wie .badge in con-raumplan: Border statt Solid-Fill, damit
     .frei/.voll sich klar wie Zustands-Chips statt wie Buttons lesen. */
  .badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 0 var(--sp-2); border-radius: var(--r-pill);
    font-size: var(--fs-xs); font-weight: 700; background: var(--band); color: var(--text-secondary);
    border: var(--border-w) solid var(--border); white-space: nowrap;
  }
  .badge.frei { color: var(--good); border-color: var(--good); background: transparent; }
  .badge.voll { opacity: .8; }

  .cal-day { margin-bottom: var(--sp-5); }
  .cal-cols { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
  @media (max-width: 640px) { .cal-cols { grid-template-columns: 1fr; } }
  .cal-col h3 { margin: var(--sp-2) 0; }
  .cal-card {
    display: block; text-decoration: none; color: inherit;
    border: var(--border-w) solid var(--border); border-radius: var(--r-md); padding: var(--sp-2) var(--sp-3); margin-bottom: var(--sp-2);
    background: var(--surface-2); box-shadow: var(--shadow-card);
  }
  .cal-card:hover { border-color: var(--accent); }
  .cal-card .t { font-weight: 600; font-size: var(--fs-sm); }
  .cal-card .m { font-size: var(--fs-xs); color: var(--text-secondary); display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: center; margin-top: 2px; }

  .facts { display: flex; flex-wrap: wrap; gap: var(--sp-3); }
  .fact {
    background: var(--surface-1); border: var(--border-w) solid var(--border); border-radius: var(--r-lg);
    padding: var(--sp-3) var(--sp-4); flex: 1 1 160px; min-width: 160px; box-shadow: var(--shadow-card);
  }
  .fact .v { font-size: var(--fs-lg); font-weight: 700; }
  .fact .l { font-size: var(--fs-xs); color: var(--text-secondary); }
  .hp-row { display: grid; grid-template-columns: minmax(120px, 240px) 1fr 34px; gap: var(--sp-3); align-items: center; margin: 5px 0; font-size: var(--fs-sm); border-radius: var(--r-sm); }
  .hp-row:hover { background: var(--band); }
  .hp-row .hp-name { text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

<script>
/* ============================================================================
   Theme-System — 1:1 aus dem Schwester-Projekt con-raumplan portiert (siehe
   dort common.js). Geteilter localStorage-Key "raumplan-theme": beide Seiten
   hängen an lmbreuer.github.io (selbe Origin), eine Theme-Wahl auf einer
   Seite gilt bewusst auch auf der anderen.
   ============================================================================ */
const THEMES = [
  { key: "dark", label: "🌙", name: "Dunkel" },
  { key: "light", label: "☀️", name: "Hell" },
  { key: "contrast", label: "◐", name: "Kontrastreich" },

const UKIYO_BACKGROUNDS = ["images/ukiyo/great-wave.jpg", "images/ukiyo/red-fuji.jpg", "images/ukiyo/thunderstorm.jpg"];
function pickUkiyoBackground() {

}
const PIXEL_CAT_SVG = `<svg class="pixel-cat" viewBox="0 0 16 16" role="img" aria-label="Eine kleine Pixel-Katze hat sich hier versteckt" xmlns="http://www.w3.org/2000/svg">
  <rect x="2" y="6" width="2" height="2"/><rect x="12" y="6" width="2" height="2"/>

  <rect x="3" y="7" width="10" height="6"/>

  <rect x="5" y="9" width="1" height="1" fill="#04150a"/><rect x="10" y="9" width="1" height="1" fill="#04150a"/>
  <rect x="7" y="11" width="2" height="1" fill="#04150a"/>
</svg>`;
function terminalEasterEgg() {
  if (window.__pdashCatLogged) return;
  window.__pdashCatLogged = true;
  console.log(
    "%c" +
    " /\\_/\\ \n" +
    "( o.o )  Playabl-Dashboard Terminal aktiviert.\n" +

}
function updateCatEasterEgg() {

}
function applyTheme(key) {
  document.documentElement.setAttribute("data-theme", key);
  try { localStorage.setItem("raumplan-theme", key); } catch {}
  if (key === "terminal") terminalEasterEgg();
  updateCatEasterEgg();
  if (key === "ukiyo") pickUkiyoBackground();
}
function renderThemeSwitch(container) {
  const current = document.documentElement.getAttribute("data-theme") || "dark";
  if (current === "terminal") terminalEasterEgg();
  if (current === "ukiyo") pickUkiyoBackground();
  updateCatEasterEgg();
  container.className = "theme-switch";
  container.setAttribute("role", "group");
  container.setAttribute("aria-label", "Farbschema wählen");
  container.innerHTML = THEMES.map(t =>
    `<button type="button" data-theme-key="${t.key}" aria-pressed="${String(t.key === current)}" title="${t.name}" aria-label="${t.name}">${t.label}</button>`
  ).join("");
  container.addEventListener("click", e => {
    const btn = e.target.closest("button[data-theme-key]");
    if (!btn) return;
    applyTheme(btn.dataset.themeKey);
    container.querySelectorAll("button").forEach(b => b.setAttribute("aria-pressed", String(b === btn)));
  });
}
renderThemeSwitch(document.getElementById("themeSwitch"));

/* ============================================================================
   KONFIGURATION – für ein anderes Standard-Event NUR diesen Block anpassen!
   (Besucher können das Event zusätzlich jederzeit über das Dropdown oder
   die URL wechseln: index.html?event=104)

   eventId:   Playabl-Event-ID, steht in der Event-URL:
              https://app.playabl.io/events/104/overview  →  104
              Titel, Datum, RSVP-Termin und alle Auswertungen holt sich die
              Seite automatisch live aus der Playabl-API.
   zielMin /  Zielkorridor: wie viele Personen (Spielplätze + anbietende
   zielMax:   Person) pro Slot untergebracht werden sollen.
   zielNotiz: Freitext zur Herkunft des Ziels ("" = ausblenden).
   erwartete: Text der Kachel „erwartete Teilnehmende je Tag" ("" = ausblenden).
   cutoffStunde: Session-Start VOR dieser Uhrzeit = Vormittag.
   zeitzone:  Zeitzone des Events (IANA-Name).
   ============================================================================ */
const CONFIG = {
  eventId: 104,
  zielMin: 70,
  zielMax: 80,
  zielNotiz: "Erfahrungswert aus dem Vorjahr: 13–16 Sessions für 70–80 Personen je Slot",
  erwartete: "~90",
  cutoffStunde: 14,
  zeitzone: "Europe/Vienna",
  // Systemfamilien für die Hitparade: gezählt wird jedes Spiel, das den
  // Begriff in System, Titel ODER Beschreibung nennt (fängt Hacks und
  // Vertreter wie "Brindlewood Bay" mit ein). Einträge frei erweiterbar.
  systemFamilien: [
    "Carved from Brindlewood",
    "Powered by the Apocalypse",
    "Belonging Outside Belonging",
    "Forged in the Dark",
    "Descended from the Queen",
    "No Dice No Masters",
  ],
};

// Workshops/Panels/Vorträge werden gesondert dargestellt (eigene Sektion) und
// zählen NICHT in Runden-/Platzzahlen – erkannt an Titel oder System:
const WS_RE = /workshop|panel|vortrag/i;

const params  = new URLSearchParams(location.search);
const EVENT   = params.get("event") || String(CONFIG.eventId);
const LO      = parseInt(params.get("min") || CONFIG.zielMin, 10);
const HI      = parseInt(params.get("max") || CONFIG.zielMax, 10);
const CUTOFF  = CONFIG.cutoffStunde;
const TZ      = CONFIG.zeitzone;
const EVENT_URL = `https://app.playabl.io/events/${EVENT}/overview`;

const SUPABASE = "https://oapuqtuewlvswrdezthc.supabase.co";
// Öffentlicher anon-Key von Playabl (steckt in deren Web-App, wird an jeden Besucher ausgeliefert):
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hcHVxdHVld2x2c3dyZGV6dGhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE2NDQ3OTExODMsImV4cCI6MTk2MDM2NzE4M30.uSjfOkoD7KXv4ztVSFhzIS9LuIsgKg42NaZotZAcqko";

async function api(path) {
  const resp = await fetch(`${SUPABASE}/rest/v1/${path}`, { headers: { apikey: ANON, Authorization: "Bearer " + ANON } });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  return resp.json();
}

const load = () => api(`sessions?select=id,start_time,end_time,participant_count,rsvps,game_id!inner(id,title,system,event_id)`
  + `&deleted_at=is.null&game_id.event_id=eq.${EVENT}&order=start_time.asc`);
const loadGames = () => api(`games?select=id,title,system,description,participant_count&event_id=eq.${EVENT}&deleted_at=is.null`).catch(() => []);
const loadEvent = () => api(`community_events?select=id,title,start_time,end_time,fixed_access_time&id=eq.${EVENT}`).then(r => r[0] || null).catch(() => null);
const loadEventsList = () => api(`community_events?select=id,title,start_time,community_id(id,name)&draft_state=eq.PUBLISHED&deleted_at=is.null&order=start_time.desc&limit=100`).catch(() => []);

const fmt = new Intl.DateTimeFormat("de-AT", { timeZone: TZ, weekday: "long", day: "2-digit", month: "2-digit" });
const fmtTime = new Intl.DateTimeFormat("de-AT", { timeZone: TZ, hour: "2-digit", minute: "2-digit" });
const dayKey = new Intl.DateTimeFormat("sv-SE", { timeZone: TZ, year: "numeric", month: "2-digit", day: "2-digit" });
const hourOf = t => parseInt(new Intl.DateTimeFormat("en-GB", { timeZone: TZ, hour: "2-digit", hour12: false }).format(new Date(t)), 10);

// Standard-Hinweistext für den Fall ohne verknüpfte Con-Raumplan-Con (reiner
// CUTOFF-Fallback); wird nach dem Laden ggf. durch die echten Zeitabschnitte
// der verknüpften Con ersetzt (siehe findSlotBuckets/Start unten).
let slotRuleHint = `Zuordnung: Session-Start vor ${CUTOFF}:00 Uhr = Vormittag, danach = Nachmittag (Zeitzone ${TZ}).`;

// buckets: aktive Zeitabschnitte der verknüpften con-raumplan-Con (falls
// vorhanden) — ersetzen den hart codierten CUTOFF-Vergleich. Ohne
// Verknüpfung (buckets leer) bleibt das bisherige Vormittag/Nachmittag-
// Verhalten unverändert erhalten.
function groupSlots(sessions, buckets) {
  const useBuckets = buckets && buckets.length;
  const rank = new Map(useBuckets ? buckets.map((b, i) => [b.label, i]) : [["Vormittag", 0], ["Nachmittag", 1]]);
  const map = new Map();
  for (const s of sessions) {
    const d = dayKey.format(new Date(s.start_time));
    let part;
    if (useBuckets) {
      const h = hourOf(s.start_time);
      const b = buckets.find(b => h >= b.start_hour && h < b.end_hour);
      part = b ? b.label : "Unsortiert";
    } else {
      part = hourOf(s.start_time) < CUTOFF ? "Vormittag" : "Nachmittag";
    }
    const key = d + "|" + part;
    if (!map.has(key)) map.set(key, { date: d, part, day: fmt.format(new Date(s.start_time)), games: [] });
    map.get(key).games.push({
      title: s.game_id.title.replace(/\s*[\[(][^\])]*(?:3W6|Offline|Con)[^\])]*[\])]\s*/gi, "").trim() || s.game_id.title,
      url: "https://app.playabl.io/games/" + s.game_id.id,
      ws: WS_RE.test((s.game_id.system || "") + " " + s.game_id.title),
      seats: s.participant_count + 1,  // Spielplätze + 1 anbietende Person (SL/Moderation)
      playerSeats: s.participant_count,
      rsvps: (s.rsvps || []).length,
      start: fmtTime.format(new Date(s.start_time)),
      end: fmtTime.format(new Date(s.end_time))
    });
  }
  return [...map.values()].sort((a, b) => a.date.localeCompare(b.date) || (rank.get(a.part) ?? 99) - (rank.get(b.part) ?? 99));
}

const reg = s => s.games.filter(g => !g.ws);   // reguläre Runden eines Slots
const wsOf = s => s.games.filter(g => g.ws);   // Workshops & Specials eines Slots
const seatsOf = s => reg(s).reduce((x, g) => x + g.seats, 0);
const slotName = s => `${s.day.split(",")[0]} ${s.part}`;
const frei = g => Math.max(0, g.playerSeats - g.rsvps);

function eventRangeText(a, b) {
  const full = new Intl.DateTimeFormat("de-AT", { timeZone: TZ, day: "numeric", month: "long", year: "numeric" });
  const dayOnly = new Intl.DateTimeFormat("de-AT", { timeZone: TZ, day: "numeric" });
  const monthYear = d => new Intl.DateTimeFormat("de-AT", { timeZone: TZ, month: "numeric", year: "numeric" }).format(d);
  const dA = new Date(a), dB = new Date(b);
  if (dayOnly.format(dA) === dayOnly.format(dB) && monthYear(dA) === monthYear(dB)) return full.format(dA);
  return monthYear(dA) === monthYear(dB)
    ? `${dayOnly.format(dA)}.–${full.format(dB)}`
    : `${full.format(dA)} – ${full.format(dB)}`;
}

// Kopfzeile (Titel, Datum, Quelle) + Anmelde-Banner aus den Event-Daten
function applyEvent(ev, rsvpsOpen) {
  const name = ev?.title || `Playabl-Event ${EVENT}`;
  document.title = `${name} – Spielangebot pro Slot`;
  document.getElementById("pageTitle").textContent = `${name} – Spielangebot pro Slot`;
  const range = ev?.start_time && ev?.end_time ? eventRangeText(ev.start_time, ev.end_time) + " · " : "";
  document.getElementById("pageSub").innerHTML =
    `${range}Datenquelle: <a href="${EVENT_URL}" style="color:inherit">${name} auf Playabl</a> · lädt bei jedem Öffnen live`;

  const banner = document.getElementById("rsvpBanner");
  if (ev?.fixed_access_time) {
    const when = new Intl.DateTimeFormat("de-AT", { timeZone: TZ, dateStyle: "full", timeStyle: "short" }).format(new Date(ev.fixed_access_time));
    banner.hidden = false;
    if (rsvpsOpen) {
      banner.classList.add("open");
      banner.innerHTML = `✅ <strong>Anmeldung ist offen</strong> (seit ${when} Uhr) – freie Plätze siehe „Wo ist noch Platz?" und Kalender.`;
    } else {
      banner.innerHTML = `🔒 <strong>Anmeldung noch gesperrt</strong> – RSVPs öffnen am ${when} Uhr. Bis dahin zeigt die Seite das Angebot.`;
    }
  }
}

// ---------- Übersichts-Ansicht ----------
function render(slots, rsvpsOpen) {
  const app = document.getElementById("app");
  const tooltip = document.getElementById("tooltip");
  const workshops = slots.flatMap(s => wsOf(s).map(g => ({ ...g, slot: s })));

  const totalSeats = slots.reduce((a, s) => a + seatsOf(s), 0);
  const totalRsvps = slots.reduce((a, s) => a + reg(s).reduce((x, g) => x + g.rsvps, 0), 0);
  const showBusy = rsvpsOpen || totalRsvps > 0;
  const avgSeats = totalSeats / Math.max(1, totalSessions);
  const MAX = Math.max(90, HI + 10, ...slots.map(s => seatsOf(s) + 5));
  const pct = v => (v / MAX * 100) + "%";
  const minSeats = Math.min(...slots.map(seatsOf));
  const allReg = slots.flatMap(s => reg(s).map(g => ({ ...g, slot: s })));
  const freeTotal = allReg.reduce((a, g) => a + frei(g), 0);

  app.innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="v">${totalSessions}</div><div class="l">Sessions gesamt</div></div>
      <div class="kpi"><div class="v">${totalSeats}</div><div class="l">Spielplätze gesamt</div></div>

      ${showBusy ? `<div class="kpi"><div class="v">${freeTotal}</div><div class="l">Spielplätze noch frei</div></div>` : ""}
      <div class="kpi"><div class="v">${LO}–${HI}</div><div class="l">Ziel-Plätze je Slot</div></div>
      ${CONFIG.erwartete ? `<div class="kpi"><div class="v">${CONFIG.erwartete}</div><div class="l">erwartete Teilnehmende je Tag</div></div>` : ""}
    </div>
    <div class="card">
      <h2 id="chartHeading">Angebotene Spielplätze pro Slot</h2>
      <p class="hint">Jedes Segment ist eine Session (Breite = Plätze inkl. der anbietenden Person)${showBusy ? ", der hellere Anteil ist bereits belegt" : ""}. Mit der Maus darüber fahren zeigt den Titel, <strong>Klick öffnet die Runde auf Playabl</strong> (Details dort z.T. erst nach Login). Das graue Band markiert das Ziel von ${LO}–${HI} untergebrachten Personen pro Slot${CONFIG.zielNotiz && LO === CONFIG.zielMin && HI === CONFIG.zielMax ? ` (${CONFIG.zielNotiz})` : ""}.${workshops.length ? " Gestrichelt umrandet: zusätzliche Plätze durch Workshops/Specials – sie zählen nicht in die Runden-Zahlen, bringen aber Teilnehmende unter." : ""} Dieselben Zahlen stehen in der Tabelle darunter.</p>
      <div class="chart" id="chart" aria-labelledby="chartHeading"></div>
      <div class="baseline-x" aria-hidden="true"><div></div><div class="xticks" id="xticks"></div></div>
    </div>
    ${showBusy ? `<div class="card">
      <h2>Wo ist noch Platz?</h2>
      <p class="hint">Reguläre Runden mit freien Spielplätzen, sortiert nach den meisten freien Plätzen.</p>
      <div id="freeList"></div>
      <p class="hp-more" id="freeMore"></p>
    </div>` : ""}
    <div class="card">
      <h2>Wo werden noch Runden gebraucht?</h2>
      <p class="hint">Fehlende Plätze bis zum unteren (${LO}) bzw. oberen Zielwert (${HI}); umgerechnet in Runden bei ø ${avgSeats.toFixed(1).replace(".", ",")} Plätzen pro Runde.</p>
      <div class="tscroll"><table>
        <caption class="sr-only">Runden, Plätze und fehlende Plätze je Slot</caption>
        <thead><tr><th scope="col">Slot</th><th scope="col">Runden</th><th scope="col">Plätze</th>${showBusy ? '<th scope="col">belegt</th>' : ""}<th scope="col">fehlt bis ${LO}</th><th scope="col">fehlt bis ${HI}</th><th scope="col">≈ Runden zusätzlich</th></tr></thead>
        <tbody id="needsBody"></tbody>
      </table></div>
      ${workshops.length ? `<p class="hint" style="margin-top:10px">* In diesem Slot gibt es zusätzlich Workshops/Specials (eigene Sektion unten) – sie bringen Teilnehmende unter, tendenziell werden dort also weniger zusätzliche Runden gebraucht.</p>` : ""}
    </div>
    <div class="card"><h2>Alle Sessions im Detail</h2><div id="detail"></div></div>
    ${workshops.length ? `<div class="card"><h2>Workshops &amp; Specials</h2>
      <p class="hint">Erkannt an „Workshop/Panel/Vortrag" in Titel oder System. Sie zählen oben nicht in Runden und Plätze, damit sie die Übersicht nicht verzerren.</p>
      <div id="wsList"></div></div>` : ""}
    <div class="card" id="funCard" hidden>
      <h2>Insights</h2>
      <p class="hint">Auswertungen über alle angebotenen Runden – wird bei jedem Öffnen live neu berechnet.</p>
      <div class="facts" id="facts"></div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:20px 0 8px">
        <h3 style="margin:0">Systeme</h3>
        <select id="sysMode" class="inline-select" aria-label="Zählweise der Systeme" hidden>
          <option value="field">nur System-Feld</option>
          <option value="mentions">Systemfamilien (Erwähnungen)</option>
        </select>
      </div>
      <p class="hint" id="sysHint"></p>
      <div id="sysList"></div>
      <p class="hp-more" id="sysMore"></p>
      <h3 id="cloudHeading">Wortwolke aus den Rundenbeschreibungen</h3>
      <div id="cloud" aria-hidden="true"></div>
      <p class="sr-only" id="cloudAlt"></p>
    </div>
    <ul class="foot">
      <li>Diese Seite lädt die Daten bei jedem Öffnen direkt von der Playabl-API – einfach neu laden für den aktuellen Stand.</li>
      <li>${slotRuleHint}</li>
      <li>Plätze = Spielplätze laut Playabl <strong>plus 1 anbietende Person</strong> (SL/Moderation) je Session – auch GMs sind ja untergebracht. Two-Shots zählen in jedem ihrer Slots.</li>
      <li>Programm außerhalb von Playabl ist nicht enthalten.</li>
    </ul>`;

  const chart = document.getElementById("chart");
  for (const slot of slots) {
    const seats = seatsOf(slot);
    const rsvps = reg(slot).reduce((x, g) => x + g.rsvps, 0);
    const nWs = wsOf(slot).length;
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `<div class="lbl"><b>${slotName(slot)}</b><span>${slot.date.slice(8)}.${slot.date.slice(5, 7)}. · ${reg(slot).length} Runden${nWs ? ` · +${nWs} Workshop${nWs > 1 ? "s" : ""}` : ""}${showBusy ? ` · ${rsvps + reg(slot).length} belegt` : ""}</span><span class="mstats">${seats} Plätze${LO - seats > 0 ? ` · noch +${LO - seats} bis Ziel` : " · Ziel erreicht"}</span></div>`;
    const track = document.createElement("div");
    track.className = "track";
    const band = document.createElement("div");
    band.className = "band";
    band.setAttribute("aria-hidden", "true");
    band.style.left = pct(LO);
    band.style.width = ((HI - LO) / MAX * 100) + "%";
    track.appendChild(band);
    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.width = pct(seats);
    for (const g of reg(slot)) {
      const seg = document.createElement("a");
      seg.className = "seg";
      seg.href = g.url;
      seg.target = "_blank";
      seg.rel = "noopener";
      seg.setAttribute("aria-label",
        `${g.title}, ${slotName(slot)} ${g.start} bis ${g.end}, ${g.playerSeats} Spielplätze plus Spielleitung` +
        (showBusy ? `, ${g.rsvps} belegt, ${frei(g)} frei` : "") + ". Öffnet die Runde auf Playabl.");
      seg.style.flex = g.seats + " 0 0";
      if (showBusy) {
        const fill = document.createElement("div");
        fill.className = "fill";
        fill.style.transform = `scaleX(${Math.min(1, (g.rsvps + 1) / g.seats)})`;
        seg.appendChild(fill);
      }
      seg.addEventListener("mousemove", e => {
        tooltip.style.display = "block";
        tooltip.innerHTML = `<div class="t">${g.title}</div><div class="s">${g.start}–${g.end} · ${g.playerSeats} Spielplätze + SL/Mod${showBusy ? ` · ${g.rsvps + 1}/${g.seats} belegt · ${frei(g)} frei` : ""} · Klick öffnet die Runde</div>`;
        tooltip.style.left = Math.min(e.clientX + 14, innerWidth - tooltip.offsetWidth - 8) + "px";
        tooltip.style.top = (e.clientY + 14) + "px";
      });
      seg.addEventListener("mouseleave", () => tooltip.style.display = "none");
      bar.appendChild(seg);
    }
    track.appendChild(bar);
    const wsSeatsTotal = wsOf(slot).reduce((x, g) => x + g.seats, 0);
    if (wsSeatsTotal > 0) {
      const ghost = document.createElement("div");
      ghost.className = "ghost";
      ghost.setAttribute("aria-hidden", "true");
      ghost.style.left = pct(seats);
      ghost.style.width = pct(Math.max(0, Math.min(wsSeatsTotal, MAX - seats)));
      track.appendChild(ghost);
    }
    const val = document.createElement("div");
    val.className = "val";
    val.style.left = `calc(${pct(seats)} + 8px)`;
    val.textContent = seats;
    track.appendChild(val);
    if (LO - seats > 0) {
      const gap = document.createElement("div");
      gap.className = "gap-note";
      gap.style.left = `calc(${pct(seats)} + 30px)`;
      gap.textContent = `+${LO - seats} bis Ziel` + (nWs ? ` · Workshop${nWs > 1 ? "s" : ""} (+${wsSeatsTotal} Pl.) hilft` : "");
      track.appendChild(gap);
    }
    row.appendChild(track);
    chart.appendChild(row);
  }

  const xt = document.getElementById("xticks");
  for (const v of [0, 20, 40, 60, LO, HI]) {
    const s = document.createElement("span");
    s.style.left = pct(v);
    s.textContent = v;
    xt.appendChild(s);
  }

  const needsBody = document.getElementById("needsBody");
  for (const slot of slots) {
    const seats = seatsOf(slot);
    const rsvps = reg(slot).reduce((x, g) => x + g.rsvps, 0);
    const n70 = Math.max(0, LO - seats), n80 = Math.max(0, HI - seats);
    const tr = document.createElement("tr");
    if (seats === minSeats) tr.className = "worst";
    tr.innerHTML = `<td>${slotName(slot)}</td><td>${reg(slot).length}</td><td>${seats}</td>`
      + (showBusy ? `<td>${rsvps + reg(slot).length}</td>` : "")
      + `<td class="need">${n70}</td><td>${n80}</td><td class="need">${Math.ceil(n70 / avgSeats)}–${Math.ceil(n80 / avgSeats)}${wsOf(slot).length ? " *" : ""}</td>`;
    needsBody.appendChild(tr);
  }

  const detail = document.getElementById("detail");
  for (const slot of slots) {
    const d = document.createElement("details");
    const rows = reg(slot).map(g => `<tr><td><a href="${g.url}" target="_blank" rel="noopener" style="color:inherit">${g.title}</a></td><td>${g.start}–${g.end} · ${g.playerSeats}+SL${showBusy ? ` · ${g.rsvps + 1}/${g.seats} belegt` : ""}</td></tr>`).join("");
    d.innerHTML = `<summary>${slot.day} ${slot.part} — ${reg(slot).length} Runden, ${seatsOf(slot)} Plätze</summary><div class="tscroll"><table class="games"><caption class="sr-only">Runden am ${slot.day} ${slot.part}</caption>${rows}</table></div>`;
    detail.appendChild(d);
  }

  if (workshops.length) {
    document.getElementById("wsList").innerHTML = workshops.map(w =>
      `<div class="ws-row"><a href="${w.url}" target="_blank" rel="noopener">${w.title}</a>
       <span>${slotName(w.slot)} · ${w.start}–${w.end} · ${w.playerSeats} Plätze</span></div>`).join("");
  }

  if (showBusy) {
    const open = allReg.filter(g => frei(g) > 0).sort((a, b) => frei(b) - frei(a));
    const full = allReg.length - open.length;
    document.getElementById("freeList").innerHTML = open.map(g =>
      `<div class="free-row"><a href="${g.url}" target="_blank" rel="noopener">${g.title}</a>
       <span>${slotName(g.slot)} · ${g.start}–${g.end} <span class="badge frei">${frei(g)} von ${g.playerSeats} frei</span></span></div>`).join("")
      || '<p class="hint">Aktuell sind alle Runden voll.</p>';
    document.getElementById("freeMore").textContent = full > 0 ? `${full} weitere Runden sind bereits voll.` : "";
  }
}

// ---------- Kalender-Ansicht ----------
function renderCalendar(slots, rsvpsOpen) {
  const cal = document.getElementById("calView");
  const showBusy = rsvpsOpen || slots.some(s => s.games.some(g => g.rsvps > 0));
  const days = new Map();
  for (const s of slots) {
    if (!days.has(s.date)) days.set(s.date, { day: s.day, parts: {} });
    days.get(s.date).parts[s.part] = s;
  }
  const card = g => `
    <a class="cal-card" href="${g.url}" target="_blank" rel="noopener" aria-label="${g.title}, ${g.start} bis ${g.end}${g.ws ? ", Workshop" : `, ${g.playerSeats} Spielplätze plus Spielleitung${showBusy ? `, ${frei(g)} frei` : ""}`}">
      <span class="t">${g.title}</span>
      <span class="m">${g.start}–${g.end}${g.ws ? ' <span class="badge">Workshop</span>' : ` · ${g.playerSeats}+SL${showBusy ? (frei(g) > 0 ? ` <span class="badge frei">${frei(g)} frei</span>` : ' <span class="badge voll">voll</span>') : ""}`}</span>
    </a>`;
  cal.innerHTML = [...days.values()].map(d => `
    <div class="card cal-day">
      <h2>${d.day}</h2>
      <div class="cal-cols">
        ${["Vormittag", "Nachmittag"].map(p => `
          <div class="cal-col">
            <h3>${p}</h3>
            ${d.parts[p] ? d.parts[p].games.map(card).join("") : '<p class="hint">– keine Runden –</p>'}
          </div>`).join("")}
      </div>
    </div>`).join("");
}

// ---------- Ansicht umschalten (Übersicht/Kalender) ----------
function setView(v) {
  const cal = v === "kalender";
  document.getElementById("app").hidden = cal;
  document.getElementById("calView").hidden = !cal;
  document.getElementById("tabOverview").setAttribute("aria-pressed", String(!cal));
  document.getElementById("tabCalendar").setAttribute("aria-pressed", String(cal));
  if (location.hash !== (cal ? "#kalender" : "") ) history.replaceState(null, "", location.pathname + location.search + (cal ? "#kalender" : ""));
}
document.getElementById("tabOverview").addEventListener("click", () => setView("uebersicht"));
document.getElementById("tabCalendar").addEventListener("click", () => setView("kalender"));

// ---------- Event-Auswahl ----------
function gotoEvent(id) {
  if (!id) return;
  const p = new URLSearchParams(location.search);
  p.set("event", id);
  location.href = location.pathname + "?" + p.toString() + location.hash;
}
document.getElementById("eventGo").addEventListener("click", () => {
  const raw = document.getElementById("eventInput").value.trim();
  const m = raw.match(/events\/(\d+)/) || raw.match(/^(\d+)$/);
  if (m) gotoEvent(m[1]);
  else alert("Bitte eine Event-ID (z.B. 104) oder eine Playabl-Event-URL eingeben.");
});
document.getElementById("eventInput").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("eventGo").click(); });
document.getElementById("eventSelect").addEventListener("change", e => gotoEvent(e.target.value));

let allEvents = [];
function fillEventsList(events) {
  allEvents = events;
  const csel = document.getElementById("communitySelect");
  const communities = new Map();
  for (const e of events) { const c = e.community_id; if (c?.id) communities.set(c.id, c.name || "?"); }
  csel.innerHTML = "";
  csel.appendChild(new Option("Alle Communities", ""));
  [...communities.entries()].sort((a, b) => a[1].localeCompare(b[1])).forEach(([id, name]) => csel.appendChild(new Option(name, id)));
  // Vorauswahl: die Community des aktuell angezeigten Events
  const current = events.find(e => String(e.id) === EVENT);
  csel.value = current?.community_id?.id || "";
  fillEventOptions();
}

function fillEventOptions() {
  const cid = document.getElementById("communitySelect").value;
  const sel = document.getElementById("eventSelect");
  const dFmt = new Intl.DateTimeFormat("de-AT", { day: "2-digit", month: "2-digit", year: "2-digit" });
  const list = cid ? allEvents.filter(e => String(e.community_id?.id) === cid) : allEvents;
  sel.innerHTML = "";
  if (!list.some(e => String(e.id) === EVENT)) {
    const ph = new Option("– Event wählen –", "");
    ph.disabled = true;
    ph.selected = true;
    sel.appendChild(ph);
  }
  for (const e of list) {
    const o = new Option(`${e.title}${e.start_time ? " (" + dFmt.format(new Date(e.start_time)) + ")" : ""}`, e.id);
    if (String(e.id) === EVENT) o.selected = true;
    sel.appendChild(o);
  }
}
document.getElementById("communitySelect").addEventListener("change", fillEventOptions);

// ---------- Ziel-Plätze anpassen ----------
function applyZiel() {
  const lo = parseInt(document.getElementById("zielMin").value, 10);
  const hi = parseInt(document.getElementById("zielMax").value, 10);
  if (!lo || !hi || lo < 1 || hi < lo) { alert("Bitte gültige Ziel-Werte angeben (von ≤ bis)."); return; }
  const p = new URLSearchParams(location.search);
  p.set("event", EVENT);
  p.set("min", lo);
  p.set("max", hi);
  location.href = location.pathname + "?" + p.toString() + location.hash;
}
document.getElementById("zielGo").addEventListener("click", applyZiel);
for (const id of ["zielMin", "zielMax"]) {
  document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") applyZiel(); });
}

// ---------- Insights ----------
function renderFun(games) {
  games = games.filter(g => !WS_RE.test((g.system || "") + " " + g.title));  // Workshops nicht in die Insights
  if (!games.length) return;
  document.getElementById("funCard").hidden = false;
  const plain = g => (g.description || "").replace(/<[^>]+>/g, " ").replace(/&amp;/g, "&").replace(/&nbsp;/g, " ");
  const cleanTitle = t => (t.replace(/\s*[\[(][^\])]*(?:3W6|Offline|Con)[^\])]*[\])]\s*/gi, "").trim() || t).slice(0, 44);

  const seats = games.map(g => g.participant_count + 1);
  const biggest = games.reduce((a, b) => b.participant_count > a.participant_count ? b : a);
  const smallest = games.reduce((a, b) => b.participant_count < a.participant_count ? b : a);
  const glRe = /gm-?less|sl-?los|spielleit(er|ungs)los|ohne\s+spielleitung|moderation:/i;
  const gmless = games.filter(g => glRe.test(g.system + " " + plain(g))).length;
  const xcard = games.filter(g => /x-?ka?rte|x-?card/i.test(plain(g))).length;
  // System-Freitext bereinigen: Klammer-Zusätze wie "[GM less]" entfernen
  const cleanSys = s => (s || "?").replace(/\s*[\[(][^\])]*[\])]\s*/g, " ").replace(/\s+/g, " ").trim() || "?";
  const famNames = (CONFIG.systemFamilien || []).map(f => f.trim()).filter(Boolean);
  const famLower = famNames.map(f => f.toLowerCase());
  const systems = new Map();
  for (const g of games) {
    const s = cleanSys(g.system);
    const k = s.toLowerCase();
    systems.set(k, { name: systems.get(k)?.name || s, n: (systems.get(k)?.n || 0) + 1 });
  }
  // Familien: Volltext-Zählung über System + Titel + Beschreibung
  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const families = famNames.map(name => ({
    name,
    fam: true,
    n: games.filter(g => new RegExp(esc(name), "i").test((g.system || "") + " " + g.title + " " + plain(g))).length
  })).filter(f => f.n >= 2);
  const facts = [
    { v: (seats.reduce((a, b) => a + b, 0) / seats.length).toFixed(1).replace(".", ","), l: "Personen pro Runde (ø, inkl. SL)" },
    { v: systems.size, l: "verschiedene Systeme – Vielfalt!" },
    { v: `${Math.round(gmless / games.length * 100)} %`, l: "der Runden kommen ohne SL aus" },
    { v: `${Math.round(xcard / games.length * 100)} %`, l: "erwähnen die X-Karte" },
    { v: biggest.participant_count + "+SL", l: `größte Runde: ${cleanTitle(biggest.title)}` },
    { v: smallest.participant_count + "+SL", l: `intimste Runde: ${cleanTitle(smallest.title)}` },
  ];
  document.getElementById("facts").innerHTML =
    facts.map(f => `<div class="fact"><div class="v">${f.v}</div><div class="l">${f.l}</div></div>`).join("");

  // Systeme-Liste mit umschaltbarer Zählweise:
  //   "field"    = zählt nur das System-Feld der Runden
  //   "mentions" = zählt Erwähnungen der konfigurierten Systemfamilien
  const ranked = [...systems.values()].sort((a, b) => b.n - a.n);
  const singles = ranked.filter(s => s.n === 1).length;
  const renderSysList = mode => {
    const rows = mode === "mentions" ? [...families].sort((a, b) => b.n - a.n) : ranked.filter(s => s.n >= 2);
    const maxN = rows.length ? rows[0].n : 1;
    document.getElementById("sysHint").textContent = mode === "mentions"
      ? "Zählt, in wie vielen Runden die Spielfamilie erwähnt wird – im System-Feld, Titel oder in der Beschreibung. Eine Runde kann zu mehreren Familien passen."
      : "Zählt schlicht, was im System-Feld der Runden steht (gleiche Schreibweisen zusammengefasst).";
    document.getElementById("sysList").innerHTML = rows.map(s =>
      `<div class="hp-row"><div class="hp-name" title="${s.name}">${s.name}</div>
       <div><div class="hp-bar" style="width:${s.n / maxN * 100}%"></div></div>
       <div class="hp-n">${s.n}×</div></div>`).join("") || '<p class="hint">Keine Einträge.</p>';
    document.getElementById("sysMore").textContent =
      mode === "field" && singles > 0 ? `… plus ${singles} Systeme, die genau einmal angeboten werden.` : "";
  };
  const modeSel = document.getElementById("sysMode");
  if (families.length) {
    modeSel.hidden = false;
    modeSel.onchange = () => renderSysList(modeSel.value);
  }
  renderSysList("field");

  const stop = new Set(("und oder aber auch noch dann wird werden wurde kann können könnt muss müssen darf dürfen soll sollen " +
    "der die das den dem des ein eine einen einem einer eines ist sind war waren sein seine seinem seiner ihr ihre ihrem ihren " +
    "wir ihr sie es ich du man uns euch mich dich sich nicht kein keine nur mehr sehr auf aus bei mit von zu zum zur nach vor über " +
    "unter durch für gegen ohne um an am im in dass wie als wenn weil ob was wer wo alle allen alles jede jeder jedes dieser diese " +
    "dieses etwas eher habe hat haben hatte gibt geht dabei dazu damit dafür darauf dort hier schon noch mal so ganz gut the and " +
    "for with you your are was were will this that not but can have has from they them our its all one two new more most other " +
    "some their there where which while who whom about into over such play game games player players playing " +
    "spiel spiele spielen spielt gespielt runde runden charaktere charakter figuren regeln system beschreibung link publisher " +
    "safety tools tool lines veils veil karte card open door policy ort offline con wien spielleitung moderation setting genre " +
    "stichwörter sprache deutsch englisch english hinweise warnungen voraussetzungen erfahrung equipment technik keine discord " +
    "https http www com net org itch drivethrurpg gerne zwei drei vier fünf pro per etc " +
    "offline-runde innen unser unsere unserer unserem unseren eure euer immer viel viele vielen selbst wäre würde werdet " +
    "dieser diesem diesen jeweils sowie bzw ggf inkl nötig notwendig hilfreich benötigt wird " +
    "verwendete verwendet kommen wollen sondern zwischen spiels spieler spielerinnen beginn teil willkommen " +
    "spielmaterial characters x-karte x-card mitbringen bringe stelle gestellt").split(/\s+/));
  const counts = new Map();
  for (const g of games) {
    for (const w of plain(g).toLowerCase().match(/[a-zäöüßæéè][a-zäöüßæéè'-]{3,}/g) || []) {
      if (!stop.has(w)) counts.set(w, (counts.get(w) || 0) + 1);
    }
  }
  const words = [...counts.entries()].filter(w => w[1] >= 3).sort((a, b) => b[1] - a[1]).slice(0, 45);
  if (words.length) {
    const wMax = words[0][1], wMin = words[words.length - 1][1];
    const shuffled = words.map(([w, n], i) => ({ w, n, key: (i * 2654435761 >>> 8) % 1000 })).sort((a, b) => a.key - b.key);
    document.getElementById("cloud").innerHTML = shuffled.map(({ w, n }) => {
      const t = wMax === wMin ? 0.5 : (Math.sqrt(n) - Math.sqrt(wMin)) / (Math.sqrt(wMax) - Math.sqrt(wMin));
      const size = (0.72 + t * 1.5).toFixed(2);
      const cls = "c" + (w.length + n) % 4;
      const weight = t > 0.55 ? 700 : 400;
      return `<span class="${cls}" style="font-size:${size}rem;font-weight:${weight}" title="${n}×">${w}</span>`;
    }).join(" ");
    document.getElementById("cloudAlt").textContent =
      "Häufigste Wörter in den Beschreibungen: " + words.slice(0, 12).map(([w, n]) => `${w} (${n}×)`).join(", ") + ".";
  }
}

// ---------- Credits & Cross-Link zum Raumplan ----------
const RAUMPLAN_URL = "https://lmbreuer.github.io/con-raumplan/";
const RAUMPLAN_SUPABASE = "https://wgnbcebakabkzjonslfi.supabase.co";
const RAUMPLAN_ANON = "sb_publishable_H87YdUgB35PR37LL-efOkA_ShJxVIaq";
async function findRaumplanCon(eventId) {
  try {
    const r = await fetch(`${RAUMPLAN_SUPABASE}/rest/v1/cons?select=id,slug&playabl_event_id=eq.${eventId}&limit=1`,
      { headers: { apikey: RAUMPLAN_ANON, Authorization: "Bearer " + RAUMPLAN_ANON } });
    if (!r.ok) return null;
    const rows = await r.json();
    return rows[0] || null;
  } catch { return null; }
}
// Aktive Zeitabschnitte der verknüpften Con lesen (öffentlich, gleicher
// anon-Key wie oben) — Basis für groupSlots(), ersetzt den CUTOFF-Fallback.
async function findSlotBuckets(conId) {
  try {
    const r = await fetch(`${RAUMPLAN_SUPABASE}/rest/v1/slot_buckets?select=label,start_hour,end_hour&con_id=eq.${conId}&active=eq.true&order=sort`,
      { headers: { apikey: RAUMPLAN_ANON, Authorization: "Bearer " + RAUMPLAN_ANON } });
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}
function renderCredits(con) {
  const slug = con?.slug || null;
  const raumplanLink = slug ? `${RAUMPLAN_URL}plan.html?con=${encodeURIComponent(slug)}` : RAUMPLAN_URL;
  document.getElementById("credits").innerHTML = `
    <span>Playabl Slot-Dashboard</span> ·
    <a href="https://playabl.io" target="_blank" rel="noopener" style="color:inherit">Playabl</a> ·
    <a href="https://www.3w6-podcast.com/" target="_blank" rel="noopener" style="color:inherit">3W6-Community</a> ·
    <a href="${raumplanLink}" style="color:inherit">Raumverteilung${slug ? " für dieses Event" : ""}</a> ·
    <a href="impressum.html" style="color:inherit">Impressum</a>`;
}

// ---------- Start ----------
Promise.all([load(), loadGames(), loadEvent(), loadEventsList(), findRaumplanCon(EVENT)]).then(async ([sessions, games, ev, eventsList, con]) => {
  renderCredits(con);

    "Stand: " + new Intl.DateTimeFormat("de-AT", { timeZone: TZ, dateStyle: "full", timeStyle: "short" }).format(new Date()) + " Uhr";

  applyEvent(ev, rsvpsOpen);

  }
  const slots = groupSlots(sessions, buckets);
  render(slots, rsvpsOpen);
  renderCalendar(slots, rsvpsOpen);

}).catch(err => {

    `<span class="err">Daten konnten nicht geladen werden (${err.message}).</span> Bitte Seite neu laden oder direkt auf <a href="${EVENT_URL}">Playabl</a> schauen.`;
});
